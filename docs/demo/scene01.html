<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Scene01 LTX Tilt-Up Demo</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #18212f;
        --muted: #5b6472;
        --line: #d9dee7;
        --paper: #f6f7f9;
        --panel: #ffffff;
        --accent: #1e6bff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: var(--paper);
        color: var(--ink);
        line-height: 1.55;
      }

      main {
        width: min(1080px, calc(100% - 32px));
        margin: 0 auto;
        padding: 40px 0 56px;
      }

      header {
        margin-bottom: 28px;
      }

      h1 {
        margin: 0 0 10px;
        font-size: clamp(2rem, 6vw, 4rem);
        line-height: 1;
        letter-spacing: 0;
      }

      p {
        margin: 0 0 16px;
      }

      a {
        color: var(--accent);
      }

      .flow {
        color: var(--muted);
        font-size: 1.05rem;
      }

      .media-block {
        margin: 24px 0;
        padding: 18px;
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
      }

      .media-block h2 {
        margin: 0 0 12px;
        font-size: 1.1rem;
      }

      img,
      video {
        display: block;
        width: 100%;
        max-width: 960px;
        height: auto;
        border-radius: 6px;
        background: #000;
      }

      nav {
        margin-top: 28px;
        display: flex;
        flex-wrap: wrap;
        gap: 14px;
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>Scene01 LTX Tilt-Up Demo</h1>
        <p class="flow">GPT-generated image -> local Codex instruction -> ComfyUI LTX workflow -> generated tilt-up video</p>
      </header>

      <section class="media-block" aria-labelledby="input-title">
        <h2 id="input-title">Input Preview</h2>
        <img src="../media/scene01_input_preview.png" alt="Scene01 input preview image">
      </section>

      <section class="media-block" aria-labelledby="video-title">
        <h2 id="video-title">Output Demo</h2>
        <video controls playsinline preload="metadata" width="960" poster="../media/scene01_input_preview.png">
          <source src="../media/scene01_output_demo.mp4" type="video/mp4">
          Your browser does not support the video tag.
        </video>
        <p><a href="../media/scene01_output_demo.mp4">Download the Scene01 demo MP4</a></p>
      </section>

      <nav aria-label="Related links">
        <a href="../case_studies/scene01_ltx_tiltup.md">Case study</a>
        <a href="../00_overview.md">Overview</a>
        <a href="https://github.com/koo-bros/4brospix">Repository</a>
      </nav>
    </main>
  </body>
</html>
